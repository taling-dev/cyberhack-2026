# Helm values for kube-prometheus-stack (namespace: observability).
# Applied with:
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n observability -f infra/values/kube-prometheus-stack.yaml
#
# Without this, the chart defaults Prometheus to an emptyDir volume with 24h
# retention — metrics are lost on every pod restart and history is capped at a
# day. This makes Prometheus durable so Grafana dashboards retain history.
prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          # OCI block volume; minimum provisioned size is 50Gi even if less is requested.
          storageClassName: oci-bv
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# Grafana SSO via Keycloak (realm: simaops, client: grafana).
# The client secret is NOT committed — it lives in the grafana-oauth secret:
#   kubectl -n observability create secret generic grafana-oauth \
#     --from-literal=client_secret=<grafana client secret from Keycloak>
# Break-glass local admin is login "grafana_admin" (renamed from "admin" to
# avoid colliding with the Keycloak "admin" user during OAuth user creation).
grafana:
  # client secret injected via env from the grafana-oauth secret (chart blocks
  # defining sensitive keys directly in grafana.ini).
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth
        key: client_secret
  grafana.ini:
    server:
      root_url: https://grafana.161.118.244.229.sslip.io
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      scopes: openid profile email roles
      auth_url: https://auth.161.118.244.229.sslip.io/realms/simaops/protocol/openid-connect/auth
      token_url: https://auth.161.118.244.229.sslip.io/realms/simaops/protocol/openid-connect/token
      api_url: https://auth.161.118.244.229.sslip.io/realms/simaops/protocol/openid-connect/userinfo
      # Map Keycloak realm roles -> Grafana org roles.
      role_attribute_path: "contains(realm_access.roles[*], 'ADMIN') && 'Admin' || contains(realm_access.roles[*], 'MANAGER') && 'Editor' || 'Viewer'"
      role_attribute_strict: false
      login_attribute_path: preferred_username
      email_attribute_path: email
      name_attribute_path: name
      use_pkce: true
