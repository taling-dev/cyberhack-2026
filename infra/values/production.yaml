# infra/values/production.yaml — SST stage: production
oci:
  region: ap-singapore-1

cluster:
  name: simaops-prod-oke
  kubernetesVersion: v1.30.1
  type: BASIC_CLUSTER

nodePool:
  shape: VM.Standard.E4.Flex
  ocpus: 4
  memoryInGbs: 32
  baselineOcpuUtilization: BASELINE_1_2  # burstable to 50%
  size: 3

dns:
  strategy: sslip.io
  # domain: simaops.example.com

ingress:
  class: nginx
  tls:
    issuer: letsencrypt-prod
