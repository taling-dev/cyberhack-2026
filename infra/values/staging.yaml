# infra/values/staging.yaml — SST stage: staging
oci:
  region: ap-singapore-1
  # tenancyOcid, userOcid, fingerprint, privateKey, compartmentOcid
  # come from environment variables (OCI_*) or ~/.oci/config

cluster:
  name: simaops-staging-oke
  kubernetesVersion: v1.30.1
  type: BASIC_CLUSTER  # free control plane

nodePool:
  shape: VM.Standard.E4.Flex
  ocpus: 2
  memoryInGbs: 16
  baselineOcpuUtilization: BASELINE_1_8  # burstable to 12.5%
  size: 2  # 2 nodes for staging

dns:
  strategy: sslip.io  # uses <lb-public-ip>.sslip.io
  # When domain is ready, switch to:
  # strategy: oci_dns
  # domain: simaops.example.com

ingress:
  class: nginx
  tls:
    issuer: letsencrypt-staging
