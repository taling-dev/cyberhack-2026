# infra/values/staging.yaml — SST stage: staging
gcp:
  project: taling-cyberhack
  region: asia-southeast2
  zone: asia-southeast2-a

cluster:
  name: simaops-gke
  systemPool:
    machineType: e2-standard-4
    nodeCount: 3
  appPool:
    machineType: e2-standard-8
    minNodes: 3
    maxNodes: 6

dns:
  strategy: sslip.io  # No domain yet; uses <ip>.sslip.io
  # When domain is ready, switch to:
  # strategy: cloud_dns
  # domain: simaops.example.com

ingress:
  class: nginx
  tls:
    issuer: letsencrypt-staging  # Switch to letsencrypt-prod when ready
