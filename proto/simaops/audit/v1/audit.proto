syntax = "proto3";

package simaops.audit.v1;

import "google/protobuf/timestamp.proto";

service AuditService {
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
  rpc GetEntityAuditTrail(GetEntityAuditTrailRequest) returns (GetEntityAuditTrailResponse);
}

// ─── Messages ────────────────────────────────────────────────────

message AuditLog {
  string id = 1;
  string actor_user_id = 2;
  string actor_role = 3;
  string action = 4;
  string entity_type = 5;
  string entity_id = 6;
  string before_json = 7;
  string after_json = 8;
  string request_id = 9;
  string trace_id = 10;
  google.protobuf.Timestamp created_at = 11;
}

// ─── Requests / Responses ────────────────────────────────────────

message ListAuditLogsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string entity_type_filter = 3;
  string actor_user_id_filter = 4;
  string action_filter = 5;
}

message ListAuditLogsResponse {
  repeated AuditLog logs = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message GetEntityAuditTrailRequest {
  string entity_type = 1;
  string entity_id = 2;
}

message GetEntityAuditTrailResponse {
  repeated AuditLog entries = 1;
}
