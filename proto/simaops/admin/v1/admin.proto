syntax = "proto3";

package simaops.admin.v1;

service AdminService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc ListProcedures(ListProceduresRequest) returns (ListProceduresResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc GetQCThresholds(GetQCThresholdsRequest) returns (QCThresholds);
  rpc UpdateQCThresholds(QCThresholds) returns (QCThresholds);
}

// ─── Enums ───────────────────────────────────────────────────────

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_OPERATOR = 1;
  ROLE_QC_SUPERVISOR = 2;
  ROLE_WAREHOUSE_STAFF = 3;
  ROLE_MANAGER = 4;
  ROLE_ADMIN = 5;
}

// ─── Messages ────────────────────────────────────────────────────

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string full_name = 4;
  repeated Role roles = 5;
  bool active = 6;
  // Custom roles aren't in the Role enum; role_names is the authoritative,
  // enum-independent role list (includes builtin + custom).
  repeated string role_names = 7;
}

message RoleDefinition {
  Role role = 1;
  string name = 2;
  string description = 3;
  bool is_system = 4;            // builtin roles cannot be deleted
  repeated string permissions = 5; // granted RPC paths (custom roles)
  string id = 6;                 // DB role id (for DeleteRole)
}

// ─── Requests / Responses ────────────────────────────────────────

message ListUsersRequest {
  int32 page_size = 1;
  string page_token = 2;
  Role role_filter = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message AssignRoleRequest {
  string user_id = 1;
  Role role = 2;
  string idempotency_key = 3;
  string role_name = 4; // preferred; supports custom roles. Falls back to enum.
}

message AssignRoleResponse {
  User user = 1;
}

message RevokeRoleRequest {
  string user_id = 1;
  Role role = 2;
  string idempotency_key = 3;
  string role_name = 4; // preferred; supports custom roles. Falls back to enum.
}

message RevokeRoleResponse {
  User user = 1;
}

message ListRolesRequest {}

message ListRolesResponse {
  repeated RoleDefinition roles = 1;
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
  repeated string permissions = 3; // RPC paths this role may call
}

message CreateRoleResponse {
  RoleDefinition role = 1;
}

message DeleteRoleRequest {
  string role_id = 1;
}

message DeleteRoleResponse {
  bool deleted = 1;
}

message ListProceduresRequest {}

message ListProceduresResponse {
  repeated string procedures = 1; // grantable RPC paths
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string full_name = 3;
  string temp_password = 4;
  repeated string role_names = 5; // initial roles to assign
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  string full_name = 2;
  string email = 3;
  bool active = 4;
  string new_temp_password = 5; // optional; resets password (temporary) when set
}

message UpdateUserResponse {
  User user = 1;
}

message UpdateRoleRequest {
  string role_id = 1;
  string description = 2;
  repeated string permissions = 3; // replaces the role's granted RPC paths
}

message UpdateRoleResponse {
  RoleDefinition role = 1;
}

// AI QC grading thresholds (0-100 quality scale). quality >= pass_min -> PASS,
// >= review_min -> REVIEW, else FAIL.
message GetQCThresholdsRequest {}

message QCThresholds {
  int32 pass_min = 1;
  int32 review_min = 2;
  int32 default_pass_min = 3;   // for the UI's reset button (read-only)
  int32 default_review_min = 4;
}
