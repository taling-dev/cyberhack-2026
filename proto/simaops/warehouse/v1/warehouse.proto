syntax = "proto3";

package simaops.warehouse.v1;

import "google/protobuf/timestamp.proto";
import "simaops/lot/v1/lot.proto";

service WarehouseService {
  rpc ListLocations(ListLocationsRequest) returns (ListLocationsResponse);
  rpc RecommendSlot(RecommendSlotRequest) returns (RecommendSlotResponse);
  rpc AssignSlot(AssignSlotRequest) returns (AssignSlotResponse);
  rpc UnassignSlot(UnassignSlotRequest) returns (UnassignSlotResponse);
  rpc ListSlotDecisions(ListSlotDecisionsRequest) returns (ListSlotDecisionsResponse);
  rpc GetWarehouseAssignments(GetWarehouseAssignmentsRequest) returns (GetWarehouseAssignmentsResponse);
}

// ─── Enums ───────────────────────────────────────────────────────

enum LocationStatus {
  LOCATION_STATUS_UNSPECIFIED = 0;
  LOCATION_STATUS_AVAILABLE = 1;
  LOCATION_STATUS_OCCUPIED = 2;
  LOCATION_STATUS_MAINTENANCE = 3;
}

enum AssignmentStatus {
  ASSIGNMENT_STATUS_UNSPECIFIED = 0;
  ASSIGNMENT_STATUS_ACTIVE = 1;
  ASSIGNMENT_STATUS_RELEASED = 2;
}

enum DecisionType {
  DECISION_TYPE_UNSPECIFIED = 0;
  DECISION_TYPE_AUTO = 1;      // AI/system auto-assigned
  DECISION_TYPE_MANUAL = 2;    // Human explicitly assigned
  DECISION_TYPE_OVERRIDE = 3;  // Human overrode an auto-decision
}

// ─── Messages ────────────────────────────────────────────────────

message WarehouseLocation {
  string id = 1;
  string code = 2;
  string zone = 3;
  double temperature_min = 4;
  double temperature_max = 5;
  repeated simaops.lot.v1.HazardClass hazard_allowed = 6;
  repeated string drum_compatibility = 7;
  int32 capacity = 8;
  LocationStatus current_status = 9;
}

message WarehouseAssignment {
  string id = 1;
  string lot_id = 2;
  string location_id = 3;
  string location_code = 4;
  string assigned_by = 5;
  google.protobuf.Timestamp assigned_at = 6;
  AssignmentStatus status = 7;
  DecisionType decision_type = 8;  // AUTO, MANUAL, OVERRIDE
  string reason = 9;               // Why this slot was recommended/assigned
}

message SlotRecommendation {
  WarehouseLocation location = 1;
  string reason = 2;
  double score = 3;
  bool is_auto_assignable = 4;  // True if this can be auto-assigned
}

message SlotDecision {
  string id = 1;
  string lot_id = 2;
  string location_id = 3;
  string location_code = 4;
  DecisionType decision_type = 5;
  string reason = 6;
  string actor_id = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ─── Requests / Responses ────────────────────────────────────────

message ListLocationsRequest {
  string zone_filter = 1;
  LocationStatus status_filter = 2;
}

message ListLocationsResponse {
  repeated WarehouseLocation locations = 1;
}

message RecommendSlotRequest {
  string lot_id = 1;
}

message RecommendSlotResponse {
  repeated SlotRecommendation recommendations = 1;
}

message AssignSlotRequest {
  string lot_id = 1;
  string location_id = 2;
  string idempotency_key = 3;
}

message AssignSlotResponse {
  WarehouseAssignment assignment = 1;
}

message GetWarehouseAssignmentsRequest {
  string lot_id = 1;
  string location_id = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GetWarehouseAssignmentsResponse {
  repeated WarehouseAssignment assignments = 1;
  string next_page_token = 2;
}

// ─── UnassignSlot ─────────────────────────────────────────────────

message UnassignSlotRequest {
  string lot_id = 1;
  string reason = 2;            // Required: why is this being unassigned
  string idempotency_key = 3;
}

message UnassignSlotResponse {
  WarehouseAssignment assignment = 1;  // The released assignment
  string lot_status = 4;               // "QC_APPROVED" - the new status
}

// ─── ListSlotDecisions ────────────────────────────────────────────

message ListSlotDecisionsRequest {
  string lot_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListSlotDecisionsResponse {
  repeated SlotDecision decisions = 1;
  string next_page_token = 2;
}
