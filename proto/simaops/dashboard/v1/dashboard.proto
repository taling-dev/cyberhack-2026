syntax = "proto3";

package simaops.dashboard.v1;

service DashboardService {
  rpc GetOpsDashboard(GetOpsDashboardRequest) returns (GetOpsDashboardResponse);
  rpc GetQCMetrics(GetQCMetricsRequest) returns (GetQCMetricsResponse);
  rpc GetWarehouseMetrics(GetWarehouseMetricsRequest) returns (GetWarehouseMetricsResponse);
  rpc GetQCTrend(GetQCTrendRequest) returns (GetQCTrendResponse);
  rpc GetLatestInspection(GetLatestInspectionRequest) returns (GetLatestInspectionResponse);
}

// ─── Messages ────────────────────────────────────────────────────

message StatusCount {
  string status = 1;
  int32 count = 2;
}

// ─── Ops Dashboard ───────────────────────────────────────────────

message GetOpsDashboardRequest {}

message GetOpsDashboardResponse {
  repeated StatusCount lots_by_status = 1;
  int32 today_intake_count = 2;
  int32 lots_awaiting_qc = 3;
  int32 lots_ready_for_production = 4;
  int32 total_lots = 5;
}

// ─── QC Metrics ──────────────────────────────────────────────────

message GetQCMetricsRequest {
  int32 hours = 1; // lookback window, default 24
}

message GetQCMetricsResponse {
  int32 total_jobs = 1;
  int32 pass_count = 2;
  int32 review_count = 3;
  int32 fail_count = 4;
  double average_confidence = 5;
  double pass_rate = 6;
  int32 pending_review_count = 7;
}

// ─── Warehouse Metrics ───────────────────────────────────────────

message GetWarehouseMetricsRequest {}

message ZoneMetrics {
  string zone = 1;
  int32 total_capacity = 2;
  int32 occupied = 3;
  int32 available = 4;
}

message GetWarehouseMetricsResponse {
  repeated ZoneMetrics zones = 1;
  int32 total_capacity = 2;
  int32 total_occupied = 3;
  int32 total_available = 4;
}

// ─── QC Trend (daily buckets) ────────────────────────────────────

message GetQCTrendRequest {
  int32 days = 1; // lookback window in days, default 7
}

message QCTrendDay {
  string date = 1; // YYYY-MM-DD
  int32 pass_count = 2;
  int32 review_count = 3;
  int32 fail_count = 4;
}

message GetQCTrendResponse {
  repeated QCTrendDay days = 1;
}

// ─── Latest Inspection (most recent QC result, globally) ─────────

message GetLatestInspectionRequest {}

message InspectionFinding {
  string mapped_finding = 1;
  double confidence = 2;
  bool is_anomaly = 3;
}

message GetLatestInspectionResponse {
  bool present = 1;            // false when no QC result exists yet
  string lot_id = 2;
  string lot_number = 3;
  string material_name = 4;
  int32 recommendation = 5;    // 1=PASS,2=REVIEW,3=FAIL
  double confidence = 6;
  string image_object_key = 7; // for a presigned view URL
  int64 created_at_unix = 8;
  repeated InspectionFinding findings = 9;
}
