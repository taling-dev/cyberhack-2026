name: Deploy Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure OCI CLI
        uses: oracle-actions/configure-oci-cli@v1.5.0
        with:
          tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          user: ${{ secrets.OCI_USER_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          privateKey: ${{ secrets.OCI_PRIVATE_KEY_PROD }}
          region: ${{ secrets.OCI_REGION }}

      - name: Get OKE kubeconfig
        run: |
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OCI_CLUSTER_OCID_PROD }} \
            --file $HOME/.kube/config \
            --region ${{ secrets.OCI_REGION }} \
            --token-version 2.0.0 \
            --kube-endpoint PUBLIC_ENDPOINT

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Deploy app Helm charts
        run: |
          TAG=${{ github.event.release.tag_name }}
          for app in api web ai-worker outbox-publisher; do
            helm upgrade --install simaops-$app deploy/helm/simaops-$app \
              --namespace simaops --create-namespace \
              --set image.tag=$TAG \
              --wait --timeout 10m
          done
