name: Deploy Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT_PROD }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OCI_CLUSTER_OCID_PROD }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Deploy app Helm charts
        run: |
          TAG=${{ github.event.release.tag_name }}
          for app in api web ai-worker outbox-publisher warehouse-intelligence; do
            helm upgrade --install simaops-$app deploy/helm/simaops-$app \
              --namespace simaops --create-namespace \
              --set image.tag=$TAG \
              --wait --timeout 10m
          done
