name: Deploy Staging

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

    steps:
      - uses: actions/checkout@v4

      # Installs + configures kubectl for the target OKE cluster using the
      # OCI_CLI_* env vars above. Requires the cluster to expose a PUBLIC
      # Kubernetes API endpoint (it does — *.sslip.io).
      - name: Configure kubectl for OKE
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OCI_CLUSTER_OCID }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Deploy app Helm charts
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          for app in api web ai-worker outbox-publisher warehouse-intelligence; do
            helm upgrade --install simaops-$app deploy/helm/simaops-$app \
              --namespace simaops --create-namespace \
              --set image.tag=$SHA \
              --wait --timeout 5m
          done
