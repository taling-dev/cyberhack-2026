name: Deploy Staging

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials simaops-gke --region ${{ secrets.GCP_REGION }}

      - name: Deploy app Helm charts
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          for app in api web ai-worker outbox-publisher; do
            helm upgrade --install simaops-$app deploy/helm/simaops-$app \
              --namespace simaops --create-namespace \
              --set image.tag=$SHA
          done
