apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: simaops-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: simaops.api
      rules:
        - alert: APIErrorRateHigh
          expr: rate(http_requests_total{job="simaops-api",code=~"5.."}[5m]) / rate(http_requests_total{job="simaops-api"}[5m]) > 0.02
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "API error rate > 2% for 5 minutes"

        - alert: APIp95LatencyHigh
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="simaops-api"}[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "API p95 latency > 1s for 5 minutes"

    - name: simaops.nats
      rules:
        - alert: NATSConsumerLagHigh
          expr: nats_consumer_num_pending{stream="SIMAOPS"} > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "NATS consumer lag > 100 messages for 5 minutes"

    - name: simaops.outbox
      rules:
        - alert: OutboxBacklog
          expr: time() - min(outbox_events_created_at{status="PENDING"}) > 300
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Outbox events pending > 5 minutes"

    - name: simaops.ai
      rules:
        - alert: AIWorkerFailureRateHigh
          expr: rate(qc_jobs_failed_total[15m]) / rate(qc_jobs_total[15m]) > 0.1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "AI worker failure rate > 10% over 15 minutes"
