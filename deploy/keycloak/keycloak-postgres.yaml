# Dedicated PostgreSQL for Keycloak (production persistence).
# Keycloak realm + users live here, NOT in ephemeral H2.
# Credentials come from the keycloak-db secret (see keycloak.yaml header).
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: platform
spec:
  clusterIP: None
  selector:
    app: keycloak-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-postgres
  namespace: platform
spec:
  serviceName: keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-postgres
  template:
    metadata:
      labels:
        app: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: keycloak
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: keycloak-db, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: keycloak-db, key: password } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "keycloak", "-d", "keycloak"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: oci-bv
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
