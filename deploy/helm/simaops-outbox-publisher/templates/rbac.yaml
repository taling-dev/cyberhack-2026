apiVersion: v1
kind: ServiceAccount
metadata:
  name: simaops-outbox-publisher
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: simaops-outbox-publisher-leader
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: simaops-outbox-publisher-leader
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: simaops-outbox-publisher
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: simaops-outbox-publisher-leader
  apiGroup: rbac.authorization.k8s.io
