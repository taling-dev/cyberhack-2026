replicaCount: 1

image:
  repository: ghcr.io/taling-dev/simaops-outbox-publisher
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8082

env:
  NATS_URL: "nats://nats.platform:4222"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.observability:4317"
  OTEL_SERVICE_NAME: "simaops-outbox-publisher"

# TIDB_DSN comes from the secret
envFrom:
  - secretRef:
      name: simaops-infra-creds

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: false

pdb:
  enabled: false

serviceMonitor:
  enabled: false
  interval: 15s

networkPolicy:
  enabled: false
