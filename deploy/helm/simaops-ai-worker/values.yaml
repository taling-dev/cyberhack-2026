replicaCount: 1

image:
  repository: ghcr.io/taling-dev/simaops-ai-worker
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8081

env:
  NATS_URL: "nats://nats.platform:4222"
  TIDB_HOST: "simaops-tidb.platform"
  TIDB_PORT: "4000"
  TIDB_USER: "root"
  TIDB_DB: "simaops"
  MINIO_ENDPOINT: "minio.platform:9000"
  QC_STRATEGY: "mock"
  MODEL_VERSION: "mock-v0.1.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"

# AI worker uses MINIO_ACCESS_KEY + MINIO_SECRET_KEY from the Secret.
# It also accepts TIDB_PASSWORD from the Secret (currently empty for root).
envFrom:
  - secretRef:
      name: simaops-infra-creds

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

pdb:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s

networkPolicy:
  enabled: false
