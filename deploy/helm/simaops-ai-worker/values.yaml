replicaCount: 1

image:
  repository: ghcr.io/taling-dev/simaops-ai-worker
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8081

env:
  NATS_URL: "nats://nats.platform:4222"
  TIDB_HOST: "simaops-tidb.platform"
  TIDB_PORT: "4000"
  TIDB_DB: "simaops"
  MINIO_ENDPOINT: "minio.platform:9000"
  MINIO_USE_SSL: "false"
  QC_IMAGES_BUCKET: "simaops-qc-images"
  QC_STRATEGY: "classifier"
  MODEL_VERSION: "yolov8s-cls-fruit-v1"
  MODEL_PATH: "models/best.pt"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"

# AI worker reads TIDB_USER + TIDB_PASSWORD + MINIO_ACCESS_KEY + MINIO_SECRET_KEY
# from the simaops-infra-creds Secret. Service-account user `simaops` (not root)
# has SELECT/INSERT/UPDATE/DELETE on the simaops database only.
envFrom:
  - secretRef:
      name: simaops-infra-creds

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 3Gi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

pdb:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 15s

networkPolicy:
  enabled: false
