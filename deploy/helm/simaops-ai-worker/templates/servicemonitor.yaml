{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  endpoints:
    - port: "{{ .Values.service.port }}"
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
{{- end }}
