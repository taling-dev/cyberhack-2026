{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Health probes from kubelet (no namespaceSelector needed; allow all source)
    - ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # NATS, MinIO, TiDB
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    # OTel
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
{{- end }}
