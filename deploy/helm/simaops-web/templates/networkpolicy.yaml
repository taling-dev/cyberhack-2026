{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public traffic via ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Reach simaops-api in same namespace
    - to:
        - podSelector:
            matchLabels:
              app: simaops-api
      ports:
        - protocol: TCP
          port: 8080
    # Reach Keycloak in platform namespace + the public auth ingress
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    # External: Keycloak via public sslip.io URL goes through ingress-nginx (covered by platform ns above)
    # Allow general egress for OIDC token exchange via public URL
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
