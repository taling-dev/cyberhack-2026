{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress-nginx + simaops-web to reach the API
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: simaops
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # TiDB, MinIO, NATS, Keycloak in platform namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    # OTel collector + observability stack
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
{{- end }}
