{{- if .Values.grafanaDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: simaops-dashboard-api
  namespace: {{ .Values.grafanaDashboards.namespace | default "observability" }}
  labels:
    grafana_dashboard: "1"
data:
  simaops-api.json: |
    {
      "title": "SimaOps — API",
      "tags": ["simaops"],
      "timezone": "browser",
      "schemaVersion": 38,
      "panels": [
        {
          "type": "timeseries",
          "title": "Request rate (req/s)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (rpc_method) (rate(http_server_request_duration_seconds_count{job=\"simaops-api\"}[1m]))", "legendFormat": "{{`{{rpc_method}}`}}"}]
        },
        {
          "type": "timeseries",
          "title": "Error rate (%)",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "100 * sum(rate(http_server_request_duration_seconds_count{job=\"simaops-api\",code=~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{job=\"simaops-api\"}[5m]))"}]
        },
        {
          "type": "timeseries",
          "title": "Latency p50 / p95 / p99",
          "gridPos": {"x": 0, "y": 8, "w": 24, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=\"simaops-api\"}[5m])))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=\"simaops-api\"}[5m])))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=\"simaops-api\"}[5m])))", "legendFormat": "p99"}
          ]
        },
        {
          "type": "stat",
          "title": "Idempotency hit rate",
          "gridPos": {"x": 0, "y": 16, "w": 8, "h": 4},
          "targets": [{"expr": "sum(rate(simaops_idempotency_hits_total[5m])) / sum(rate(simaops_idempotency_requests_total[5m]))"}]
        },
        {
          "type": "stat",
          "title": "Auth failures (401/403)",
          "gridPos": {"x": 8, "y": 16, "w": 8, "h": 4},
          "targets": [{"expr": "sum(rate(http_server_request_duration_seconds_count{job=\"simaops-api\",code=~\"401|403\"}[5m]))"}]
        }
      ]
    }
{{- end }}
