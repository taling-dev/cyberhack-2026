{{- if .Values.grafanaDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: simaops-dashboard-ai-worker
  namespace: {{ .Values.grafanaDashboards.namespace | default "observability" }}
  labels:
    grafana_dashboard: "1"
data:
  simaops-ai-worker.json: |
    {
      "title": "SimaOps \u2014 AI Worker",
      "uid": "simaops-ai",
      "tags": [
        "simaops",
        "ai"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Jobs/min",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(rate(simaops_ai_worker_jobs_total[5m])) * 60",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 1
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total processed",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(simaops_ai_worker_jobs_total{status=\"completed\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Failure rate (15m)",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "100 * sum(rate(simaops_ai_worker_jobs_total{status=\"failed\"}[15m])) / clamp_min(sum(rate(simaops_ai_worker_jobs_total[15m])),1)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green"
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "p95 inference latency",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(simaops_ai_worker_inference_duration_seconds_bucket[5m])))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 3
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Recommendation distribution",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (recommendation) (rate(simaops_ai_worker_jobs_total{status=\"completed\"}[5m]))",
              "refId": "A",
              "legendFormat": "{{`{{recommendation}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Inference duration p50 / p95",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, material_type) (rate(simaops_ai_worker_inference_duration_seconds_bucket[5m])))",
              "refId": "A",
              "legendFormat": "p50 {{`{{material_type}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, material_type) (rate(simaops_ai_worker_inference_duration_seconds_bucket[5m])))",
              "refId": "B",
              "legendFormat": "p95 {{`{{material_type}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "NATS consumer pending messages",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "nats_consumer_num_pending_messages",
              "refId": "A",
              "legendFormat": "{{`{{consumer_name}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Failures by reason",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (reason) (rate(simaops_ai_worker_job_failures_total[5m]))",
              "refId": "A",
              "legendFormat": "{{`{{reason}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        }
      ]
    }
{{- end }}
