{{- if .Values.grafanaDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: simaops-dashboard-operations
  namespace: {{ .Values.grafanaDashboards.namespace | default "observability" }}
  labels:
    grafana_dashboard: "1"
data:
  simaops-operations.json: |
    {
      "title": "SimaOps \u2014 Operations",
      "uid": "simaops-ops",
      "tags": [
        "simaops"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total lots created",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(simaops_api_lots_created_total)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "QC reviews (1h)",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(increase(simaops_api_qc_reviewed_total[1h]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Warehouse assignments",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(simaops_api_warehouse_assignments_total)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Idempotency hits",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(simaops_api_idempotency_total{outcome=\"hit\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green"
                  }
                ]
              }
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Lot intake rate (lots/min)",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum(rate(simaops_api_lots_created_total[5m])) * 60",
              "refId": "A",
              "legendFormat": "lots/min",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "QC review decisions over time",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (decision) (rate(simaops_api_qc_reviewed_total[5m]))",
              "refId": "A",
              "legendFormat": "{{`{{decision}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "AI recommendations (PASS / REVIEW / FAIL)",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (recommendation) (rate(simaops_ai_worker_jobs_total{status=\"completed\"}[5m]))",
              "refId": "A",
              "legendFormat": "{{`{{recommendation}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Service pod readiness",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum by (pod) (kube_pod_status_ready{namespace=\"simaops\",condition=\"true\"})",
              "refId": "A",
              "legendFormat": "{{`{{pod}}`}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        }
      ]
    }
{{- end }}
