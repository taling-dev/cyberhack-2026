{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: simaops-platform
  namespace: {{ .Release.Namespace }}
  labels:
    app: simaops
    release: kube-prometheus-stack
spec:
  groups:
    - name: simaops.api
      interval: 30s
      rules:
        - alert: SimaopsAPIErrorRateHigh
          expr: |
            (
              sum(rate(simaops_api_http_requests_total{code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(simaops_api_http_requests_total[5m])), 1)
            ) > 0.02
          for: 5m
          labels: {severity: critical, service: simaops-api}
          annotations:
            summary: "API 5xx error rate above 2% for 5 minutes"
            description: "5xx error rate is {{ "{{" }} $value | humanizePercentage {{ "}}" }} on simaops-api."

        - alert: SimaopsAPIp95LatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(simaops_api_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 5m
          labels: {severity: warning, service: simaops-api}
          annotations:
            summary: "API p95 latency above 1s for 5 minutes"
            description: "p95 latency is {{ "{{" }} $value {{ "}}" }}s."

    - name: simaops.ai-worker
      interval: 60s
      rules:
        - alert: SimaopsNATSConsumerLagHigh
          expr: nats_consumer_num_pending_messages{consumer_name="simaops-ai-worker"} > 100
          for: 5m
          labels: {severity: warning, service: simaops-ai-worker}
          annotations:
            summary: "AI worker NATS consumer lag above 100 messages"
            description: "{{ "{{" }} $value {{ "}}" }} messages pending."

        - alert: SimaopsAIWorkerFailureRateHigh
          expr: |
            (
              sum(rate(simaops_ai_worker_jobs_total{status="failed"}[15m]))
              /
              clamp_min(sum(rate(simaops_ai_worker_jobs_total[15m])), 1)
            ) > 0.10
          for: 15m
          labels: {severity: warning, service: simaops-ai-worker}
          annotations:
            summary: "AI worker failure rate above 10% for 15 minutes"
            description: "{{ "{{" }} $value | humanizePercentage {{ "}}" }} of jobs failing."

    - name: simaops.workload
      interval: 60s
      rules:
        - alert: SimaopsPodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="simaops"}[10m]) > 3
          for: 5m
          labels: {severity: warning, service: simaops}
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is crash-looping"
            description: "Container {{ "{{" }} $labels.container {{ "}}" }} restarted {{ "{{" }} $value {{ "}}" }} times in 10m."

        - alert: SimaopsPodNotReady
          expr: |
            kube_pod_status_ready{namespace="simaops",condition="true"} == 0
          for: 10m
          labels: {severity: critical, service: simaops}
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} not ready for 10m"

    - name: simaops.outbox
      interval: 30s
      rules:
        # OutboxBacklog — fires when the outbox publisher falls behind. Backlog
        # should be < 10 in steady state; > 50 sustained 5m means publishing
        # cannot keep up with mutation rate (NATS down, leader lapse, slow DB).
        - alert: SimaopsOutboxBacklog
          expr: simaops_outbox_backlog_size > 50
          for: 5m
          labels: {severity: warning, service: simaops-outbox-publisher}
          annotations:
            summary: "Outbox backlog above 50 events for 5 minutes"
            description: "{{ "{{" }} $value {{ "}}" }} pending events. Check outbox publisher logs and NATS connectivity."

        # OutboxNoLeader — sum of `simaops_outbox_is_leader` across all pods
        # should always equal 1. If it's 0 for >2 minutes the lease has lapsed
        # and no events will publish.
        - alert: SimaopsOutboxNoLeader
          expr: sum(simaops_outbox_is_leader) < 1
          for: 2m
          labels: {severity: critical, service: simaops-outbox-publisher}
          annotations:
            summary: "No outbox publisher leader for 2 minutes"
            description: "Lease lapsed or all outbox-publisher pods down. Events will accumulate."

        # OutboxFailureRate — rate of FAILED events (max retries exceeded).
        # Should be ~0; any non-zero rate indicates a real problem.
        - alert: SimaopsOutboxFailureRate
          expr: rate(simaops_outbox_events_failed_total[10m]) > 0
          for: 10m
          labels: {severity: warning, service: simaops-outbox-publisher}
          annotations:
            summary: "Outbox events being marked FAILED"
            description: "{{ "{{" }} $value {{ "}}" }} events/sec are exhausting retries. Check NATS reachability and event payloads."

    - name: simaops.business
      interval: 60s
      rules:
        # LotsStuckInQCReview — lots stuck waiting for human reviewer for >24h.
        # Indicates a workflow bottleneck (no supervisor working, missed handoff).
        # Driven by the simaops_api_lots_by_status gauge exported by the dashboard
        # service. We use the `awaiting_review` label.
        - alert: SimaopsLotsStuckInQCReview
          expr: simaops_api_lots_by_status{status="AWAITING_REVIEW"} > 0
          for: 24h
          labels: {severity: warning, service: simaops-api, business: qc}
          annotations:
            summary: "Lots stuck in AWAITING_REVIEW for over 24h"
            description: "{{ "{{" }} $value {{ "}}" }} lot(s) have been waiting for QC supervisor review longer than 24h. Assign a reviewer or escalate."

        # LotsStuckInAIProcessing — lots stuck in AI_PROCESSING for >15min,
        # which is well beyond expected end-to-end latency (~5s mock, ~30s real).
        # Indicates an AI worker stall or NATS consumer lapse.
        - alert: SimaopsLotsStuckInAIProcessing
          expr: simaops_api_lots_by_status{status="AI_PROCESSING"} > 0
          for: 15m
          labels: {severity: warning, service: simaops-api, business: qc}
          annotations:
            summary: "Lots stuck in AI_PROCESSING for over 15 minutes"
            description: "{{ "{{" }} $value {{ "}}" }} lot(s) have been processing for over 15m. AI worker may be stalled or unable to upload results."

    - name: simaops.sse
      interval: 60s
      rules:
        # SSEHighSlowClientDrops — non-zero drop rate from full client channels.
        # A small trickle is normal under load; sustained > 1/s suggests we
        # need to grow the channel buffer or investigate slow consumers.
        - alert: SimaopsSSEHighSlowClientDrops
          expr: rate(simaops_api_sse_events_dropped_total{reason="slow_client"}[5m]) > 1
          for: 10m
          labels: {severity: warning, service: simaops-api}
          annotations:
            summary: "SSE slow-client drop rate above 1/s for 10m"
            description: "{{ "{{" }} $value {{ "}}" }} events/sec dropped due to full client channels."

        # SSEHighEvictions — per-user LRU eviction rate. Normal usage is 0;
        # sustained eviction indicates a runaway client (browser tab loop) or
        # a coordinated DDoS via many SSE handshakes.
        - alert: SimaopsSSEHighEvictions
          expr: rate(simaops_api_sse_connections_evicted_total[10m]) > 0.5
          for: 10m
          labels: {severity: warning, service: simaops-api}
          annotations:
            summary: "SSE per-user eviction rate above 0.5/s for 10m"
            description: "Possible runaway client or DDoS — check connection counts per user."

        # SSEDispatchPanics — should always be zero. Any non-zero count means
        # we hit a bug in the NATS message handler (envelope parse, filter logic).
        - alert: SimaopsSSEDispatchPanics
          expr: increase(simaops_api_sse_dispatch_panics_total[5m]) > 0
          for: 1m
          labels: {severity: critical, service: simaops-api}
          annotations:
            summary: "SSE dispatcher recovered from panic"
            description: "{{ "{{" }} $value {{ "}}" }} panic(s) in the last 5m. Inspect API logs for the recovered stack trace."

        # APIClockSkewHigh — API pod's clock vs Keycloak more than 30s off.
        # JWT validation has 60s leeway so we still serve traffic, but anything
        # above 30s should be investigated (chrony broken, NTP server unreachable).
        - alert: SimaopsAPIClockSkewHigh
          expr: abs(simaops_api_clock_skew_seconds) > 30
          for: 5m
          labels: {severity: warning, service: simaops-api}
          annotations:
            summary: "API clock skew vs Keycloak above 30s for 5m"
            description: "Skew is {{ "{{" }} $value {{ "}}" }}s. Check NTP/chrony on the underlying node."
{{- end }}
