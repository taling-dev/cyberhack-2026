replicaCount: 2

image:
  repository: ghcr.io/taling-dev/simaops-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

env:
  MINIO_ENDPOINT: "minio.161.118.244.229.sslip.io"
  MINIO_USE_SSL: "true"
  NATS_URL: "nats://nats.platform:4222"
  KEYCLOAK_ISSUER: "https://auth.161.118.244.229.sslip.io/realms/simaops"
  KEYCLOAK_INTERNAL_URL: "http://keycloak.platform:8080/realms/simaops"
  KEYCLOAK_CLIENT_ID: "simaops-web"
  KEYCLOAK_ADMIN_CLIENT_ID: "simaops-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.observability:4317"
  OTEL_SERVICE_NAME: "simaops-api"
  WAREHOUSE_INTELLIGENCE_URL: "http://simaops-warehouse-intelligence.simaops:8000"
  CORS_ALLOWED_ORIGINS: "https://app.161.118.244.229.sslip.io,http://localhost:5173,http://localhost:3000"

# Secrets injected via envFrom — sensitive values live in the simaops-infra-creds Secret,
# never in this file. See `kubectl create secret generic simaops-infra-creds`.
envFrom:
  - secretRef:
      name: simaops-infra-creds

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s

networkPolicy:
  enabled: false

prometheusRule:
  enabled: true

grafanaDashboards:
  enabled: true
  namespace: observability

seedJob:
  enabled: true
  dbHost: simaops-tidb.platform
  dbPort: "4000"
  dbUser: root
  dbName: simaops
